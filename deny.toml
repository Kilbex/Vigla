# cargo-deny policy for the complete locked dependency graph.
#
# `cargo deny check` is a required pull-request gate. Exceptions are narrow and
# documented so a newly introduced license, source, or advisory fails closed.

[advisories]
ignore = [
  { id = "RUSTSEC-2026-0194", reason = "quick-xml 0.37 is Windows-only through tauri-winrt-notification and never handles Vigla input" },
  { id = "RUSTSEC-2026-0195", reason = "quick-xml 0.39 parses Vigla's own bundle plist at build time; clear when Tauri updates" },
  { id = "RUSTSEC-2024-0411", reason = "GTK3 transitive dependency is not loaded by the supported macOS application" },
  { id = "RUSTSEC-2024-0412", reason = "GTK3 transitive dependency is not loaded by the supported macOS application" },
  { id = "RUSTSEC-2024-0413", reason = "GTK3 transitive dependency is not loaded by the supported macOS application" },
  { id = "RUSTSEC-2024-0414", reason = "GTK3 transitive dependency is not loaded by the supported macOS application" },
  { id = "RUSTSEC-2024-0415", reason = "GTK3 transitive dependency is not loaded by the supported macOS application" },
  { id = "RUSTSEC-2024-0416", reason = "GTK3 transitive dependency is not loaded by the supported macOS application" },
  { id = "RUSTSEC-2024-0417", reason = "GTK3 transitive dependency is not loaded by the supported macOS application" },
  { id = "RUSTSEC-2024-0418", reason = "GTK3 transitive dependency is not loaded by the supported macOS application" },
  { id = "RUSTSEC-2024-0419", reason = "GTK3 transitive dependency is not loaded by the supported macOS application" },
  { id = "RUSTSEC-2024-0420", reason = "GTK3 transitive dependency is not loaded by the supported macOS application" },
  { id = "RUSTSEC-2024-0370", reason = "unmaintained transitive macro helper with no maintained compatible replacement upstream" },
  { id = "RUSTSEC-2024-0436", reason = "unmaintained transitive macro helper with no maintained compatible replacement upstream" },
  { id = "RUSTSEC-2025-0075", reason = "unmaintained transitive Unicode helper; re-check on dependency updates" },
  { id = "RUSTSEC-2025-0080", reason = "unmaintained transitive dependency; re-check on dependency updates" },
  { id = "RUSTSEC-2025-0081", reason = "unmaintained transitive dependency; re-check on dependency updates" },
  { id = "RUSTSEC-2025-0098", reason = "unmaintained transitive dependency; re-check on dependency updates" },
  { id = "RUSTSEC-2025-0100", reason = "unmaintained transitive dependency; re-check on dependency updates" },
]

[bans]
multiple-versions = "allow"
wildcards = "deny"
allow-wildcard-paths = true

[licenses]
confidence-threshold = 0.93
include-dev = true
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
  "https://github.com/rust-lang/crates.io-index",
]

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Vigla app icon</title>
  <desc id="desc">A teal mission-control reticle framing a precise V-shaped command mark on a deep navy field.</desc>
  <defs>
    <linearGradient id="field" x1="180" y1="112" x2="844" y2="912" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182433"/>
